<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a365d">
<meta name="mobile-web-app-capable" content="yes">
<title>Bergamo & Milano 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue:#1a365d;--blue2:#2b6cb0;--white:#fff;--gray:#f7f8fa;--gray2:#e2e8f0;
--text:#1a202c;--text2:#4a5568;--shadow:0 2px 8px rgba(0,0,0,.08);
--radius:12px;--cat-landmark:#3182ce;--cat-food:#dd6b20;--cat-transport:#38a169;--cat-event:#e53e3e;
--safe-b:env(safe-area-inset-bottom,0px);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--gray);color:var(--text);font-size:15px;line-height:1.5;
padding-bottom:calc(64px + var(--safe-b));overflow-x:hidden}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--blue),var(--blue2));
color:var(--white);padding:14px 16px 10px;text-align:center}
.header h1{font-size:20px;font-weight:700;letter-spacing:.5px}
.header p{font-size:12px;opacity:.85;margin-top:2px}

/* DAY TABS (sticky) */
.day-tabs-wrap{position:sticky;top:56px;z-index:90;background:var(--white);
border-bottom:1px solid var(--gray2);overflow-x:auto;-webkit-overflow-scrolling:touch;
scrollbar-width:none}
.day-tabs-wrap::-webkit-scrollbar{display:none}
.day-tabs{display:flex;gap:0;padding:0 8px;min-width:max-content}
.day-tab{padding:10px 14px;font-size:13px;font-weight:600;white-space:nowrap;
border-bottom:3px solid transparent;cursor:pointer;color:var(--text2);transition:.2s}
.day-tab.active{color:var(--blue);border-bottom-color:var(--blue2)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;
background:var(--white);border-top:1px solid var(--gray2);
display:flex;padding-bottom:var(--safe-b)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
padding:8px 2px 6px;font-size:9px;font-weight:600;color:var(--text2);
cursor:pointer;border:none;background:none;transition:.2s}
.nav-btn.active{color:var(--blue2)}
.nav-btn span.icon{font-size:20px;margin-bottom:2px}

/* TAB CONTENT */
.tab-content{display:none;padding:0 0 20px}
.tab-content.active{display:block}

/* DAY SECTION */
.day-section{display:none;padding:12px}
.day-section.active{display:block}
.day-header{background:var(--white);border-radius:var(--radius);padding:16px;
margin-bottom:16px;box-shadow:var(--shadow)}
.day-header h2{font-size:18px;margin-bottom:4px}
.day-header .day-sub{font-size:13px;color:var(--text2)}

/* TIMELINE */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;
width:2px;background:var(--gray2)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-28px;top:6px;width:18px;height:18px;
border-radius:50%;border:3px solid var(--white);box-shadow:0 0 0 2px var(--gray2)}
.tl-dot.landmark{background:var(--cat-landmark)}
.tl-dot.food{background:var(--cat-food)}
.tl-dot.transport{background:var(--cat-transport)}
.tl-dot.event{background:var(--cat-event)}
.tl-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.tl-time{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
border-radius:20px;margin-bottom:6px;text-transform:uppercase}
.tl-badge.landmark{background:#bee3f8;color:#2b6cb0}
.tl-badge.food{background:#feebc8;color:#c05621}
.tl-badge.transport{background:#c6f6d5;color:#276749}
.tl-badge.event{background:#fed7d7;color:#c53030}
.tl-title{font-size:15px;font-weight:700;margin-bottom:4px}
.tl-desc{font-size:13px;color:var(--text2);line-height:1.55}
.tl-map{display:inline-block;margin-top:8px;font-size:12px;font-weight:600;
color:var(--blue2);text-decoration:none}

/* GUIDE / TIP */
.guide-toggle{display:block;width:100%;text-align:left;background:#fffbeb;
border:none;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;
padding:10px 14px;margin-top:10px;font-size:13px;font-weight:600;
cursor:pointer;color:#92400e}
.guide-content{display:none;background:#fffbeb;border-left:4px solid #f59e0b;
border-radius:0 0 8px 0;padding:10px 14px;font-size:13px;color:#78350f;line-height:1.6}
.guide-content.open{display:block}
.tip-box{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 8px 8px 0;
padding:10px 14px;margin-top:8px;font-size:13px;color:#1e40af;line-height:1.55}

/* MAPS TAB */
.map-big-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,var(--blue),var(--blue2));
color:var(--white);border:none;border-radius:var(--radius);font-size:16px;
font-weight:700;text-align:center;text-decoration:none;margin:16px 0;cursor:pointer;box-shadow:var(--shadow)}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
.map-grid a{display:flex;align-items:center;gap:8px;padding:12px;background:var(--white);
border-radius:var(--radius);text-decoration:none;color:var(--text);font-size:13px;
font-weight:600;box-shadow:var(--shadow)}
.map-grid a .mg-icon{font-size:22px}

/* PLACES TAB */
.places-group{padding:12px}
.places-group h3{font-size:16px;margin:12px 0 8px;padding-left:4px}
.place-item{display:flex;align-items:center;gap:10px;background:var(--white);
border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:var(--shadow)}
.place-item .pi-emoji{font-size:24px;flex-shrink:0}
.place-item .pi-info{flex:1;min-width:0}
.place-item .pi-name{font-size:14px;font-weight:600}
.place-item .pi-desc{font-size:12px;color:var(--text2)}
.place-item .pi-map{flex-shrink:0;font-size:20px;text-decoration:none;
width:36px;height:36px;display:flex;align-items:center;justify-content:center;
background:var(--gray);border-radius:50%}

/* INFO TAB */
.info-section{padding:12px}
.info-card{background:var(--white);border-radius:var(--radius);padding:16px;
margin-bottom:12px;box-shadow:var(--shadow)}
.info-card h3{font-size:16px;margin-bottom:10px}
.info-card label{display:flex;align-items:flex-start;gap:10px;padding:6px 0;
font-size:13px;cursor:pointer}
.info-card label input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--blue2)}
.info-card p,.info-card li{font-size:13px;color:var(--text2);line-height:1.55}
.info-card ul{list-style:none;padding:0}
.info-card ul li{padding:4px 0}
.info-card a{color:var(--blue2);text-decoration:none;word-break:break-all}
.info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--gray)}
.info-row:last-child{border:none}

/* PERSON CHIPS */
.person-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.person-chip{background:var(--gray);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}

/* DAY MAP */
.day-map{height:260px;border-radius:var(--radius);margin-bottom:4px;z-index:1;box-shadow:var(--shadow);width:100%;min-height:200px;touch-action:manipulation}
.day-map-link{display:block;text-align:center;font-size:12px;color:var(--blue2);margin:4px 0 16px;font-weight:600;text-decoration:none}

/* TRANSIT */
.transit{display:flex;align-items:center;gap:6px;padding:4px 0 4px 6px;font-size:11px;color:#888;font-style:italic}
.transit-icon{font-size:13px;flex-shrink:0}
.transit-time{margin-left:auto;font-weight:600;color:#666;white-space:nowrap}
.map-marker-icon{display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1}

/* TICKETS TAB */
.ticket-day-group{padding:12px}
.ticket-day-title{font-size:16px;font-weight:700;margin:12px 0 8px;padding-left:4px}
.ticket-card{background:var(--white);border-radius:var(--radius);border-left:4px solid var(--blue);
padding:12px 16px;margin:8px 0;box-shadow:var(--shadow);cursor:pointer}
.ticket-card.today{border-left-color:var(--cat-event);box-shadow:0 0 0 2px rgba(229,62,62,.2)}
.ticket-header{display:flex;justify-content:space-between;align-items:center}
.ticket-icon{font-size:24px;flex-shrink:0}
.ticket-title{font-weight:700;font-size:15px;flex:1;margin:0 10px}
.ticket-time{font-size:13px;color:var(--text2);white-space:nowrap}
.ticket-sub{font-size:12px;color:var(--text2);margin-top:2px}
.ticket-details{font-size:12px;color:#888;margin-top:6px;line-height:1.6}
.ticket-warning{background:#fff5f5;border:1px solid #feb2b2;border-radius:6px;
padding:6px 10px;font-size:11px;color:#c53030;margin-top:6px}
.ticket-seats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:4px;margin-top:6px}
.seat-badge{background:#ebf8ff;border-radius:4px;padding:3px 8px;font-size:11px}
.ticket-body{display:none;margin-top:10px;border-top:1px solid var(--gray2);padding-top:10px}
.ticket-body.open{display:block}
.ticket-img-wrap{margin:8px 0;text-align:center}
.ticket-img-wrap img{width:100%;border-radius:8px;cursor:pointer}
.ticket-zoom-btn{display:inline-block;padding:6px 14px;font-size:12px;font-weight:600;
color:var(--blue2);background:var(--gray);border:none;border-radius:20px;cursor:pointer;margin-top:6px}
.ticket-person-select{width:100%;padding:8px;border:1px solid var(--gray2);border-radius:8px;
font-size:13px;margin-bottom:8px;background:var(--white)}
.ticket-summary{padding:12px}
.ticket-summary-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.ticket-summary-card h3{font-size:16px;margin-bottom:10px}
.today-badge{display:inline-block;background:var(--cat-event);color:#fff;font-size:9px;
font-weight:700;padding:2px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.show-ticket-btn{display:inline-flex;align-items:center;gap:4px;background:#ebf8ff;color:#2c5282;
border:1px solid #bee3f8;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;
cursor:pointer;margin-top:4px}
.show-ticket-btn:active{background:#bee3f8}

/* TICKET SELECTOR OVERLAY */
.ts-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9998;
background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
.ts-overlay.open{display:flex}
.ts-panel{background:#fff;width:100%;max-width:480px;max-height:70vh;border-radius:16px 16px 0 0;
padding:16px;overflow-y:auto;animation:tsUp .25s ease}
@keyframes tsUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ts-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ts-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:4px 8px}
.ts-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--gray);
border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.15s}
.ts-item:active{background:#bee3f8}
.ts-item-icon{font-size:18px;flex-shrink:0}
.ts-item-info{flex:1;min-width:0}
.ts-item-label{font-size:13px;font-weight:600}
.ts-item-sub{font-size:11px;color:#888}

/* FULLSCREEN VIEWER */
.fs-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center}
.fs-overlay.open{display:flex}
.fs-close{position:absolute;top:16px;right:16px;font-size:28px;color:#fff;background:none;
border:none;cursor:pointer;z-index:10000;width:40px;height:40px}
.fs-img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}

@media(min-width:600px){
.map-grid{grid-template-columns:1fr 1fr 1fr}
.day-section{max-width:640px;margin:0 auto}
.places-group,.info-section{max-width:640px;margin:0 auto}
}
</style>
</head>
<body>

<div class="header">
<h1>Bergamo & Milano 2026</h1>
<p>30 kwietnia – 6 maja &middot; 7 dni &middot; 6 uczestniczek</p>
</div>

<!-- TAB: PLAN -->
<div class="tab-content active" id="tab-plan">
<div class="day-tabs-wrap"><div class="day-tabs" id="dayTabs"></div></div>
<div id="dayContainer"></div>
</div>

<!-- TAB: MAPA -->
<div class="tab-content" id="tab-map">
<div style="padding:12px">
<a class="map-big-btn" href="https://maps.app.goo.gl/m2xjVuzzMiAVwCTU7?g_st=iw" target="_blank" rel="noopener">
Otwórz pełną mapę Ani (58 miejsc)
</a>
<h3 style="font-size:15px;margin:16px 0 10px;padding-left:4px">Szybka nawigacja</h3>
<div class="map-grid" id="mapGrid"></div>
</div>
</div>

<!-- TAB: MIEJSCA -->
<div class="tab-content" id="tab-places">
<div id="placesContainer"></div>
</div>

<!-- TAB: BILETY -->
<div class="tab-content" id="tab-tickets">
<div id="ticketsContainer"></div>
</div>

<!-- TAB: INFO -->
<div class="tab-content" id="tab-info">
<div id="infoContainer"></div>
</div>

<!-- TICKET SELECTOR -->
<div class="ts-overlay" id="tsOverlay" onclick="closeTsOverlay()">
<div class="ts-panel" onclick="event.stopPropagation()">
<div class="ts-title"><span id="tsTitle">Wybierz bilet</span><button class="ts-close" onclick="closeTsOverlay()">✕</button></div>
<div id="tsItems"></div>
</div>
</div>

<!-- FULLSCREEN VIEWER -->
<div class="fs-overlay" id="fsOverlay" onclick="closeFullscreen()">
<button class="fs-close" onclick="closeFullscreen()">✕</button>
<img class="fs-img" id="fsImg" src="" alt="Bilet">
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
<button class="nav-btn active" data-tab="tab-plan"><span class="icon">📋</span>Plan</button>
<button class="nav-btn" data-tab="tab-map"><span class="icon">🗺️</span>Mapa</button>
<button class="nav-btn" data-tab="tab-tickets"><span class="icon">🎫</span>Bilety</button>
<button class="nav-btn" data-tab="tab-places"><span class="icon">📍</span>Miejsca</button>
<button class="nav-btn" data-tab="tab-info"><span class="icon">ℹ️</span>Info</button>
</nav>

<script src="tickets_data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ========== DATA ==========
const DAYS=[
// DAY 1
{id:1,emoji:'✈️',name:'Przylot',date:'Czwartek, 30 kwietnia',city:'Bergamo',
summary:'Przylot do Bergamo · Transfer do apartamentu',
items:[
{time:'21:30',cat:'transport',title:'Wylot z Gdańska',desc:'Lot FR3279, Gdańsk (GDN) → Mediolan/Bergamo (BGY). Czas lotu ok. 2h 10min. Ryanair – mamy priority boarding i 2 sztuki bagażu podręcznego na osobę (kabinowa walizka + mniejsza torba). Bagaże nie trafiają na taśmę – wychodzimy od razu z samolotu!'},
{time:'23:40',cat:'transport',title:'Lądowanie w Bergamo (BGY)',desc:'Lotnisko Orio al Serio. Nie odbieramy bagaży z taśmy (wszystko w kabinie!). Lotnisko kompaktowe – od bramki do wyjścia ok. 5-10 minut.'},
{time:'~0:00',cat:'transport',title:'Transfer do apartamentu',desc:'Via Vittorio Alfieri, 14, 24127 Bergamo (Città Bassa). Od lotniska ok. 5 km.',
map:'Via Vittorio Alfieri 14 Bergamo Italy',
guide:'OPCJA 1 – TAXI (rekomendowane!): postoje przed halą przylotów. Koszt ok. 20-25 €, 10-15 min bezpośrednio do apartamentu.\n\nOPCJA 2 – AUTOBUS ATB Linia 1: kursuje z lotniska do centrum Bergamo aż do ok. 1:30 w nocy, co 20 min. Bilet ok. 2,60 € (strefa C). Autobus jedzie do Stazione FS (dworca), ale stamtąd do apartamentu jeszcze ~2 km, ok. 25 min pieszo — ZA DALEKO z bagażami o północy!',
tip:'Przy przylocie o północy, z 7-latką, dwoma babciami i bagażami – rekomendowane TAXI. Potrzebne 2 samochody. Koszt łączny: ok. 40-50 € – warto za komfort po podróży.'},
{time:'~0:30',cat:'landmark',title:'🏠 Apartament w Bergamo',desc:'Via Vittorio Alfieri, 14, 24127 Bergamo. Zakwaterowanie i odpoczynek. Città Bassa – spokojna, nowsza część miasta, w południowej części centrum (~2 km od dworca).',
map:'Via Vittorio Alfieri 14 Bergamo'}
]},
// DAY 2
{id:2,emoji:'🏰',name:'Bergamo',date:'Piątek, 1 maja',city:'Bergamo',
summary:'Całodniowe zwiedzanie · Città Alta · Funikulary · Mury Weneckie',
items:[
{time:'8:30',cat:'food',title:'Śniadanie w Città Bassa',desc:'Typowe włoskie śniadanie: cappuccino + cornetto (rogalik z kremem/dżemem/czekoladą). Koszt: ok. 3-4 €/os. Uwaga: 1 maja – Festa del Lavoro – niektóre sklepy zamknięte, ale bary i atrakcje działają.',
guide:'Apartament jest w południowej części Città Bassa. W okolicy Via Cerasoli i Via Alfieri (2-3 min pieszo) znajdziecie bary z typowym włoskim śniadaniem. Polecany: Il Fornaio (świetne recenzje, przystępne ceny, szybkie przekąski i pizza). UWAGA: dworzec kolejowy (Stazione FS) jest ~2 km dalej, ok. 25 min pieszo.'},
{time:'9:45',cat:'transport',title:'Funikular do Città Alta 🚋',desc:'Ze stacji przy Viale Vittorio Emanuele II (ok. 20 min pieszo z apartamentu, ~1,5 km, lub autobus ATB). Jazda 3 min, ale spektakularna! Przyjeżdżamy na Piazza Mercato delle Scarpe.',
map:'Funicolare Bergamo Città Alta',
guide:'Funikular działa nieprzerwanie od 1887 roku! Dwa wagony połączone liną – kiedy jeden jedzie w górę, drugi zjeżdża. Ostatnia renowacja 1987 r. Rocznie >2 mln pasażerów!\n\nDla Emilki: ten wagonik jedzie po bardzo stromej górze – jak kolejka górska, ale wolniej! I te ogromne mury mają prawie 500 lat!',
tip:'Rozważcie bilet 24h Tourist Ticket – autobusy ATB + oba funikulary. Bilet jednorazowy: ok. 1,35 € (strefa A), ważny 75 min.'},
{time:'10:15',cat:'landmark',title:'Piazza Vecchia – serce Città Alta ⭐',desc:'Główny plac górnego miasta. Le Corbusier nazwał go „najpiękniejszym placem Europy"! Fontanna Contariniego, Palazzo della Ragione, Torre Civica, Palazzo Nuovo.',
map:'Piazza Vecchia Bergamo',
guide:'Le Corbusier odwiedził Bergamo w 1949 r. podczas kongresu CIAM 7 (w Palazzo della Ragione!) i powiedział: „Nie można ruszyć ani jednego kamienia – to byłaby zbrodnia!" Plac powstał dokładnie w miejscu starożytnego forum rzymskiego.\n\nPalazzo della Ragione z XII w. – najstarszy zachowany budynek administracji publicznej w całej Lombardii. Pod jego arkadami ukryty jest XVIII-wieczny zegar słoneczny – w południe promień słońca przechodzi przez otwór w tarczy i wskazuje datę oraz znak zodiaku na podłodze!\n\nFontanna – dar weneckiego podestà (namiestnika) Alvise Contariniego z 1780 r. Ciekawostka: w 1885 r. fontannę usunięto i postawiono pomnik Garibaldiego – wróciła dopiero na początku XX w.!\n\nNa ścianie Bazyliki S.M. Maggiore (tuż obok) widoczne są żelazne pręty – „misure" – średniowieczne wzorce miar długości używane na bergamskim targu.\n\nPalazzo Nuovo naprzeciwko – zaprojektowany przez Vincenza Scamozziego w 1611 r., ukończony dopiero w 1928 r.! Dziś mieści Bibliotekę Angelo Mai – jedną z najważniejszych w Italii (inkunabuły — najstarsze książki drukowane, sprzed 1501 r. — oraz rękopisy).\n\nDla Emilki: ten plac stoi tu, gdzie 2000 lat temu Rzymianie mieli swój rynek! A ta fontanna raz zniknęła na ponad 20 lat! Pod tymi arkadami jest zegar słoneczny – szukamy razem?'},
{time:'11:00',cat:'landmark',title:'Campanone (Torre Civica) 🔔',desc:'Wieża 52,76 m z największym dzwonem Lombardii. Windą lub 230 schodów. Wstęp: ok. 7 €. Panorama na oba miasta i Alpy.',
map:'Campanone Torre Civica Bergamo',
guide:'Każdego wieczoru o 22:00 dzwon bije dokładnie 100 razy – tradycja wenecka, zamknięcie bram! Dzwon z 1656 r. waży >5 ton.\n\nDla Emilki: 100 razy każdego wieczoru – kiedyś to znaczyło zamknięcie bram, nikt nie mógł wejść ani wyjść! Liczymy razem wieczorem?',
tip:'Z Emilką i babciami – windą! Na szczycie taras widokowy z mapą panoramiczną alpejskich szczytów.'},
{time:'11:45',cat:'landmark',title:'Bazylika Santa Maria Maggiore + Kaplica Colleoniego ⭐',desc:'Piazza Duomo – Bazylika (XII w.) i Kaplica Colleoniego (1472-1476). Wejście bezpłatne.',
map:'Cappella Colleoni Bergamo',
guide:'BAZYLIKA SANTA MARIA MAGGIORE powstała w XII w. jako wotum za ustanie epidemii. Z zewnątrz surowa romańska bryła. Ale wewnątrz – absolutna barokowa eksplozja! Złocone sztukaterie, gobeliny z XVI–XVII w., inkrustowane drewniane stalle chórowe (drewniane ławki, w których siedzieli zakonnicy) ze scenami biblijnymi wykonanymi techniką intarsji – to obrazy ułożone z tysięcy kawałków kolorowego drewna, jak gigantyczne puzzle! Tu spoczywa Gaetano Donizetti (1797-1848) – słynny kompozytor operowy urodzony w Bergamo, autor ponad 70 oper („Łucja z Lammermoor", „Napój miłosny"). Na ścianie zewnętrznej: żelazne „misure" – średniowieczne wzorce miar długości.\n\nKAPLICA COLLEONIEGO – arcydzieło renesansu (1472–1476), wzniesiona przez Giovanniego Antonia Amadea (rzeźbiarza i architekta). Bartolomeo Colleoni – jeden z najsłynniejszych condottierów (włoskich najemnych dowódców wojskowych), służył Wenecji jako kapitan generalny. Miał prawie 2 metry wzrostu! Kazał zburzyć sakrystię bazyliki na swoją kaplicę. Herb na kratce z trzema „kulami" (po włosku: testicoli — stąd żart!) – „Colleoni" w dialekcie bergamskim brzmi jak… cóż, powiedzmy że herb nawiązuje do nazwiska. „Colleoni! Colleoni! Colleoni!" – tak brzmiał jego okrzyk bojowy. Dotykanie herbu przynosi szczęście – niektórzy wierzą, że zapewnia płodność, inni – że sukces finansowy. Herb jest wypolerowany na złoto od setek tysięcy rąk turystów!\n\nTAJEMNICA GROBU: przez wieki sarkofag wydawał się pusty! Kiedy król Wiktor Emanuel III odwiedził Bergamo w 1922 r., nikt nie potrafił mu powiedzieć, gdzie leżą szczątki Colleoniego! Zagadkę rozwiązano dopiero w 1969 r. – ciało odnaleziono w krypcie pod dolnym sarkofagiem, z mieczem pod plecami. Obok: grób jego ukochanej córki Medei, zmarłej w wieku 14 lat. Przy jej szczątkach znaleziono wypchanego ptaszka – jej pupila – widocznego do dziś pod szklaną kopułką! Kopułę kaplicy pokrywają freski młodego Tiepola (1732–1733).\n\nDla Zuzi i Emilki: koniecznie dotknijcie herbu na szczęście! I szukajcie ptaszka Medei – ma ponad 550 lat!'},
{time:'12:30',cat:'landmark',title:'Katedra w Bergamo (Duomo)',desc:'Katedra pw. św. Aleksandra, patrona miasta. Neoklasyczna fasada z białego marmuru. Obrazy Moroniego i Tiepola.',
map:'Duomo di Bergamo'},
{time:'13:00',cat:'food',title:'Obiad w Città Alta 🍽️',desc:'Rekomendowane: Il Circolino (dawny klasztor i więzienie!) lub Da Mimmo (kuchnia bergamaska). Budżet: 15-25 €/os.',
guide:'KUCHNIA BERGAMASKA – Europejska Stolica Sera! 9 serów PDO.\n\nCo spróbować:\n• CASONCELLI ALLA BERGAMASCA – lokalna specjalność! Pierożki (jak polskie, ale półksiężycowate) z mięsem, rodzynkami i amaretti (włoskie ciasteczka migdałowe), z burro e salvia (masło szałwiowe) i pancettą (włoski boczek)\n• POLENTA TARAGNA – z serem\n• Deser: STRACCIATELLA – wynaleziona tutaj!\n\nDla Emilki: casoncelli powinny zasmakować (słodko-słone). Na deser stracciatella w La Marianna!'},
{time:'14:30',cat:'landmark',title:'Spacer po Murach Weneckich 🏛️',desc:'Mury Weneckie – UNESCO od 2017. 6 km murów. Spacer 1-1,5 km z widokami na Città Bassa, dolinę i Alpy. Ścieżka wygodna, zacieniona.',
map:'Mura Venete Bergamo',
guide:'Mury zbudowane w latach 1561–1588 przez Republikę Wenecką (panującą tu 350 lat). Bergamo było ostatnim bastionem weneckim przed granicą z Księstwem Mediolanu. Paradoks: mury NIGDY nie zostały zaatakowane – dzięki temu zachowały się idealnie! Podczas budowy Wenecjanie wyburzyli ok. 250 domów i kilka kościołów. System obronny: bastiony, stanowiska dział, bramy i tajne tunele!\n\nO wpis na listę UNESCO (uzyskany w 2017) bergamczycy starali się od 2007 r. W 2016, tuż przed ostateczną decyzją, aż 11 507 mieszkańców zgromadziło się przy murach! 1250 osób ustawiło się wzdłuż 5 km obwodu i utworzyło sztafetę przytuleń – każdy przytulał następnego, fala szła wzdłuż murów. Rekord Guinnessa w kategorii „najdłuższa sztafeta przytuleń"! Dodatkowo 5730 par przytulało się jednocześnie – drugi rekord tego dnia!\n\nDla Emilki: Republika Wenecji – państwo ze stolicą w mieście na wodzie z gondolami! Budowali te mury 27 lat! A żeby je obronić przed UNESCO, ludzie się przytulali!'},
{time:'15:30',cat:'landmark',title:'Funikular na San Vigilio 🏔️',desc:'Drugi funikular – jeszcze wyżej! Jazda 3 min. Najlepszy widok panoramiczny na Bergamo, dolinę Padańską i Alpy. Ruiny zamku z XIV w.',
map:'Castello di San Vigilio Bergamo Alta',
guide:'Funikular od 27 sierpnia 1912 r. Zamek na szczycie (Castello di San Vigilio) z XIV w. – strażnicy kontrolowali stąd wszystkie drogi.\n\nDla Emilki: na szczycie ruiny prawdziwego zamku – kiedyś stali tu rycerze!',
tip:'Na San Vigilio jest bar z tarasem widokowym – idealna kawa lub sok z widokiem na Alpy.'},
{time:'16:30',cat:'landmark',title:'Spacer uliczkami Città Alta',desc:'Via Gombito i Via B. Colleoni – sklepy, kawiarnie, lodziarnie, warsztaty. Opcjonalnie: Palazzo Moroni (barokowe freski).',
map:'Via Bartolomeo Colleoni Bergamo'},
{time:'17:00',cat:'food',title:'Lody stracciatella w La Marianna 🍨',desc:'Tu w 1961 r. Enrico Panattoni wynalazł stracciatellę! Obowiązkowy przystanek!',
map:'Gelateria La Marianna Bergamo Colle Aperto',
guide:'Panattoni wlał gorącą płynną czekoladę do kręcącej się bazy fior di latte. Czekolada stężała w odłamki. Patent nigdy nie zastrzeżony!\n\nDla Emilki: te lody wymyślono TUTAJ! Pan Enrico wlał gorącą czekoladę do zimnych lodów i – pach! – czekolada popękała na milion kawałeczków!'},
{time:'17:30',cat:'transport',title:'Zjazd funikularem do Città Bassa',desc:'Powrót funikularem (3 min jazdy). Spacer do Sentierone: ok. 10 min pieszo od dolnej stacji funikularu.'},
{time:'18:00',cat:'food',title:'Aperitivo w Sentierone',desc:'Elegancka aleja – „Champs-Élysées Bergamo". Aperol Spritz (6-8 €) z oliwkami i orzechami.',
guide:'Aperitivo to jedna z najważniejszych tradycji. 18:00-20:00 = „sacred hour". W wielu barach za cenę drinka dostajecie przekąski. Dzieci mogą dostać bezalkoholowego Spritza.'},
{time:'19:30',cat:'food',title:'Kolacja w Città Bassa',desc:'Propozycje do sprawdzenia: Ristorante Lalimentari (Via Broseta 58, nowoczesna kuchnia bergamska), Trattoria Colombina (Via Borgo Santa Caterina 30, tradycyjna), Mimi e CoCo (Via Colleoni, w górnym mieście).'},
{time:'22:00',cat:'event',title:'🔔 100 uderzeń Campanone!',desc:'Otwieramy okna i słuchamy! Tradycja wenecka – zamknięcie bram. Nawet z Città Bassa doskonale słychać. Magiczny moment!'}
]},

{id:4,emoji:'⛪',name:'Mediolan – Duomo',date:'Niedziela, 3 maja',city:'Mediolan',
summary:'Duomo di Milano ⭐ · Tarasy dachowe · Bugs Bunny at the Symphony 🐰🎵',
items:[
{time:'8:30',cat:'food',title:'Śniadanie w Navigli',desc:'Croissant z pistacjowym kremem, cappuccino – dolce vita!'},
{time:'9:30',cat:'transport',title:'Metro do Duomo',desc:'M2→M1 (~15 min, przesiadka Cadorna) lub M2 do Cadorna + spacer Via Dante (~30 min).'},
{time:'10:00',cat:'landmark',title:'Piazza del Duomo',desc:'Fasada Duomo + wejście do Gallerii V. Emanuele II – warto od razu zajrzeć do środka! Kawa i ciastko w legendarnej cukierni Marchesi 1824 (wewnątrz Gallerii, od 1824 r.).',
map:'Piazza del Duomo Milano',
guide:'DUOMO DI MILANO – 3. największa katedra katolicka świata. Budowa od 1386, fasada ukończona dopiero w 1813 r. na rozkaz Napoleona Bonapartego (który koronował się tu na króla Włoch w 1805 r.!). >3400 posągów, 135 wieżyczek, 96 gargulców. Biało-różowy marmur z Candoglii – transportowany kanałami!\n\nNa szczycie (108,5 m) – złota Madonnina (1774), symbol Mediolanu.\n\nDla Emilki: >3400 posążków! Gargulce jak smoki! Madonnina na 108 m – jakby 30 Emilków!\n\n⚠️ DRESS CODE: zakryte ramiona i kolana! Dotyczy też Zuzi!'},
{time:'10:30',cat:'event',title:'Kontrola bezpieczeństwa',desc:'Kontrola w stylu lotniskowym przy wejściu. Kolejka do wejścia na tarasy.'},
{time:'10:45',cat:'landmark',title:'⭐ TARASY DACHOWE Duomo',desc:'SCHODAMI (Combo Stairs) – ok. 250 schodów na tarasy! Panorama 360° – Alpy i Apeniny! Gargulce, >2000 posągów, Madonnina z bliska.',
guide:'Dach to ~8000 m² – jak boisko piłkarskie! >2000 posągów, każdy inny. Marmur zmienia kolor z białego na różowy o zachodzie – katedra „różowieje"!\n\nDla Zuzi: jedno z niewielu miejsc, gdzie chodzisz po dachu gotyckiej katedry! Instagram gold!',
tip:'Bilety już zarezerwowane! Combo Stairs, godz. 11:00, GATE 1 ORANGE. 2 rezerwacje po 3 bilety. Szczegóły w sekcji 🎫 Bilety.'},
{time:'12:00',cat:'landmark',title:'Wnętrze katedry',desc:'Co zobaczyć (trasa): 1) Wejście główne – staniecie w głównej nawie, widok na całą długość; 2) Lewa nawa – posąg św. Bartłomieja „bez skóry" (niesie własną skórę jak szal!); 3) Podłoga – Meridiana (zegar słoneczny z 1786 r.); 4) Nad głowami na 45 m – relikwiarz Świętego Gwoździa.',
guide:'MERIDIANA (1786) – mosiężny pas ze znakami zodiaku na podłodze. Słońce przez otwór na 24 m wskazuje miesiąc!\n\n„ŚWIĘTY GWÓŹDŹ" – relikwiarz na 45 m, opuszczany raz w roku „nivolą" – urządzeniem Leonarda da Vinci!\n\nPOSĄG ŚW. BARTŁOMIEJA – niesie własną skórę jak szal. Służył studentom medycyny!'},
{time:'12:30',cat:'landmark',title:'Krypta + Strefa archeologiczna',desc:'Krypta: kryształowy sarkofag św. Karola Boromeusza. Podziemia: Baptysterium św. Jana (IV w.), Bazylika św. Tekli – tu wg tradycji św. Ambroży ochrzcił św. Augustyna w 387 r.!',
guide:'Karol Boromeusz (1538-1584) – podczas dżumy 1576 osobiście odwiedzał chorych, sprzedał meble kościelne. Kanonizowany 26 lat po śmierci.\n\nDla Emilki: ten święty był tak odważny, że kiedy wszyscy uciekali, on został i pomagał.'},
{time:'12:45',cat:'landmark',title:'Museo del Novecento (opcja)',desc:'Sztuka XX w. – Fontana, Boccioni, De Chirico. Wejście z Piazza Duomo, 10 €. 20-30 min na szybki obchód.',
map:'Museo del Novecento Milano'},
{time:'13:00',cat:'food',title:'Szybki lunch 🥟',desc:'Panzerotti Luini (z listy Ani!) – smażone calzone, 3-5 €/szt. Via Santa Radegonda 16, za Duomo. Lub Spontini – kultowa pizza al taglio.',
map:'Panzerotti Luini Milano'},
{time:'13:30',cat:'landmark',title:'Galleria V. Emanuele II + spacer',desc:'Spacer przez Gallerię (tradycja z bykiem! 🐂), kawa. Potem w kierunku Auditorium – Via Torino lub metro.',
map:'Galleria Vittorio Emanuele II Milano',
guide:'„Salon Mediolanu" z 1867 r. Szklany kopulasty dach. TRADYCJA Z BYKIEM: na mozaice z herbami 4 miast – piętą na „klejnotach" byka + 3 obroty = szczęście! Byk wydrążony od turystów.\n\nEmilka i Zuzia MUSZĄ to zrobić! 🐂'},
{time:'14:30',cat:'event',title:'Okolice Auditorium',desc:'Odpoczynek przed koncertem. Spacer nad kanałem, kawiarnia w okolicy Largo Mahler.',
map:'Auditorium di Milano Largo Gustav Mahler'},
{time:'15:00',cat:'event',title:'Auditorium di Milano',desc:'Largo Gustav Mahler. Wejście, zajęcie miejsc.'},
{time:'15:30',cat:'event',title:'🐰 BUGS BUNNY AT THE SYMPHONY!',desc:'Orchestra Sinfonica di Milano. Koncert symfoniczny z projekcjami Looney Tunes! Do 17:40.',
guide:'Hit nie tylko dla Emilki! Orkiestra na żywo: Rossini, Strauss, Wagner, Liszt, Czajkowski. Twórcy Looney Tunes przemycali edukację muzyczną.\n\nDla Emilki: Bugs Bunny dyryguje orkiestrą, Daffy Duck tańczy balet!\n\nDla Zuzi: aranżacje Carla Stallinga – jedne z najlepszych w historii muzyki filmowej.\n\n🍵 TERESA I LUCYNA (nie mają biletów) planują spędzić ten czas na własną rękę. Propozycje: Kawa i relaks w Navigli nad kanałem (np. Yguana Café lub bar przy Alzaia Naviglio Grande) – idealne na spokojne popołudnie z widokiem na kolorowe kamienice. Mogą też spacerować po Via Tortona (galerie designu).'},
{time:'17:40',cat:'transport',title:'Powrót do Navigli',desc:'Pieszo wzdłuż kanału (~12 min) lub metro M2 Porta Genova + pieszo.'},
{time:'18:10',cat:'event',title:'Odpoczynek w apartamencie',desc:'Chwila wytchnienia po pełnym dniu.'},
{time:'19:00',cat:'food',title:'Kolacja w Navigli 🍷',desc:'Wieczór w ulubionych knajpkach nad kanałem. Osteria da Fortunata, Berberè, La Magolfa.'}
]},

guide:'Najspektakularniejsze momenty:\n\n1. WIADUKT SPIRALNY BRUSIO – jedyny na świecie! Tory kręcą się w 360°!\n2. LAGO DI POSCHIAVO – alpejskie jezioro po prawej\n3. ALPE GRÜM (2091 m) – widok na lodowiec Palü\n4. PRZEŁĘCZ BERNINA (2253 m) – jeziora mogą być zamarznięte! Tu europejski dział wodny\n5. LODOWIEC MORTERATSCH – jeden z najdłuższych w Alpach Wschodnich\n6. ZJAZD DO ENGADYNY – serpentyny z widokiem na dolinę\n\nDla Emilki: PRAWDZIWE lodowce i most, na którym pociąg kręci się w kółko!',
tip:'Bilety i miejsca już zarezerwowane – wagon 1, miejsca 35-36, 41-42, 45-46. Szczegóły w sekcji 🎫 Bilety. Miejsca są po LEWEJ stronie jadąc do St. Moritz (panoramiczna strona na doliny i lodowce!).'},
{time:'12:11',cat:'landmark',title:'Przyjazd St. Moritz 🏔️',desc:'Stacja nad jeziorem. W maju jezioro może być częściowo pokryte lodem!',
map:'St. Moritz Switzerland'},
{time:'12:15',cat:'food',title:'Jezioro + lunch',desc:'Spacer wzdłuż brzegu jeziora – płaska, łatwa trasa. Cała pętla to 4 km (~1 godz. spokojnym krokiem), ale można przejść tylko część i zawrócić (np. 2 km, 30 min). Z 7-latką i babciami rekomendowany krótszy wariant.',
map:'Lake St. Moritz',
tip:'Przystępne opcje: supermarkety Coop lub Migros (gotowe sałatki, kanapki, 8-12 CHF/os), piekarnia Hatz & Hatzerlì (lokalna, przystępna), lub kebab/pizza na Via dal Bagn (~15 CHF). Restauracja z fondue: ~35-45 CHF/os.'},
{time:'13:30',cat:'landmark',title:'Via Serlas',desc:'Najwyżej położona luksusowa ulica Europy – Chanel, Céline, Louis Vuitton.',
map:'Via Serlas St. Moritz',
guide:'Kolebka turystyki zimowej! 2 Zimowe Olimpiady (1928, 1948). W 1864 r. hoteliarz Johannes Badrutt (właściciel legendarnego Kulm Hotel – najstarszego hotelu w St. Moritz, działa do dziś!) założył się z Brytyjczykami – że pokochają zimę w Alpach – i miał rację: zostali do Wielkanocy! St. Moritz ma własne zastrzeżone logo.'},
{time:'14:30',cat:'landmark',title:'Muzeum Segantiniego / spacer',desc:'Alpejski malarz-symbolista (1858-1899). 15 CHF. Lub Chesa Futura (Norman Foster).',
map:'Segantini Museum St. Moritz'},
{time:'15:00',cat:'landmark',title:'Krzywa Wieża St. Moritz',desc:'Pochylenie WIĘKSZE niż Krzywa Wieża w Pizie – 5,5° vs 3,97°!',
map:'Schiefer Turm St. Moritz',

items:[
{time:'9:30',cat:'food',title:'Dłuższe śniadanie ☕',desc:'Odpoczynek po alpejskiej ekspedycji. Żadnego pośpiechu! Wyjście ok. 10:15.'},
{time:'10:45',cat:'landmark',title:'🎨 Cenacolo Vinciano (Ostatnia Wieczerza)',desc:'Cenacolo Vinciano (Ostatnia Wieczerza) – REZYGNUJEMY z wejścia (brak biletów). Ale warto przejść obok – sam budynek i plac są piękne! P.za Santa Maria delle Grazie 2.',
map:'Cenacolo Vinciano Milano',
guide:'Leonardo malował 1495-1497 (3 lata!). Eksperymentalna technika – nie fresco! Łuszczy się od XVI w. Cudem przeżył bombardowanie 1943.\n\nLegenda o Judaszu: Leonardo szukał twarzy tak długo, że przeor narzekał. Leonardo: „Jeśli nie znajdę, użyję twojej." Przeor zamilkł.\n\nDla Zuzi: mimika 12 apostołów – każdy reaguje inaczej. Psychologiczna głębia!\n\nDla Emilki: malował TEN obraz 3 lata! Jakbyś zaczęła teraz i skończyła kiedy będziesz mieć 10 lat!'},
{time:'11:05',cat:'landmark',title:'Santa Maria delle Grazie',desc:'Kościół tuż obok Cenacolo. Kopuła Bramantego, UNESCO. BEZPŁATNE! 5-10 min.',

{time:'11:25',cat:'landmark',title:'San Maurizio al Monastero Maggiore',desc:'„Kaplica Sykstyńska Mediolanu" – freski ucznia Leonarda! Każdy cm pokryty! BEZPŁATNE!',
map:'San Maurizio Monastero Maggiore Milano',
guide:'Kościół podzielony na część publiczną i klasztorną. Kolory zaskakująco zachowane – intensywne błękity, złocenia, czerwienie.\n\nDla Emilki: jak wielka kolorowa książka – WSZYSTKIE ściany pomalowane! Znajdź anioły – jest ich mnóstwo!'},
{time:'11:50',cat:'landmark',title:'🔬 Muzeum Nauki i Technologii Leonardo da Vinci',desc:'Via San Vittore 21. Największe muzeum nauki we Włoszech! Galeria Leonarda, okręt podwodny Toti, samoloty, interaktywne laby. 13 €/8 €. ~1,5h.',
map:'Museo Scienza Leonardo Milano',
guide:'Ponad 16 000 eksponatów! Galeria Leonarda – największa kolekcja modeli jego wynalazków. Okręt podwodny S-506 Enrico Toti – wchodzicie do środka!\n\nDla Emilki: PRAWDZIWY okręt podwodny, samoloty, pociągi i wynalazki Leonarda – HIT!',
tip:'Wt–pt: 9:30–17:00. Interaktywne laboratoria – sprawdźcie dostępność na miejscu.'},
{time:'13:30',cat:'food',title:'Lunch 🍝',desc:'Restauracje w okolicach Sant\'Ambrogio. Vento di Sardegna (kuchnia sardyńska, z listy Ani) lub Gusto 17. 15-25 €/os.'},
{time:'14:30',cat:'landmark',title:'Castello Sforzesco + Parco Sempione 🏰',desc:'Zamek-twierdza XV w. Dziedziniec + Pietà Rondanini Michała Anioła (ostatnie dzieło!). Za zamkiem: Parco Sempione (39 ha) + plac zabaw dla Emilki. ~1h.',
map:'Castello Sforzesco Milano',
guide:'Francesco Sforza zbudował zamek 1450 r. Leonardo malował tu Sala delle Asse.\n\nPOLSKIE POŁĄCZENIE: Wnuczka Francesca Sforzy – Bona Sforza – w 1518 r. poślubiła polskiego króla Zygmunta I Starego i została królową Polski! Przywiozła ze sobą włoskich kucharzy i warzywa – pomidory (pomodori), kalafior (cavolfiore), sałatę (insalata). Do dziś w polskich sklepach kupujemy pęczek warzyw do zupy zwany „włoszczyzną" – dosłownie „włoskie rzeczy"! Więc Castello Sforzesco to zamek przodków polskiej królowej!\n\nPIETÀ RONDANINI – ostatnie, najporuszające dzieło Michała Anioła, pracował do 6 dni przed śmiercią (1564). Celowo „niedokończona" – postaci Maryi i Jezusa ledwo wyłaniają się z surowego marmuru, jakby dopiero się rodziły.\n\nARCO DELLA PACE – wzorowany na paryskim. Rozpoczęty za Napoleona jako „Łuk Zwycięstwa", Austriacy zmienili nazwę na „Łuk Pokoju" – bo to oni wygrali!\n\nDla Emilki: w tym zamku mieszkali prawdziwi książęta! Leonardo malował sufit jak las! A wnuczka tutejszego księcia została królową Polski!'},
{time:'15:40',cat:'landmark',title:'Brera',desc:'Artystyczne serce Mediolanu. Galerie, antykwariaty, boutique\'y. Opcjonalnie: Pinacoteca di Brera (Rafael, Mantegna, Caravaggio). ~40 min.',
map:'Brera Milano',
tip:'Opcja: Via Lincoln – kolorowe kamienice jak z bajki! Idealny Instagram spot. 15 min metrem od Brery.'},
{time:'16:20',cat:'landmark',title:'🤌 Piazza degli Affari – rzeźba L.O.V.E.',desc:'L.O.V.E. (wł. Libertà – Wolność, Odio – Nienawiść, Vendetta – Zemsta, Eternità – Wieczność). Kontrowersyjna rzeźba Maurizia Cattelana (11 m!) naprzeciwko giełdy. 5-10 min na zdjęcia.',
map:'Piazza degli Affari Milano'},
{time:'16:35',cat:'landmark',title:'Galleria Vittorio Emanuele II ⭐',desc:'Najstarsza galeria handlowa Włoch (1867). Szklany kopulasty dach, mozaiki. „Salon Mediolanu". Spacer + tradycja z bykiem + kawa. ~45 min.',
map:'Galleria Vittorio Emanuele II Milano',
guide:'Zaprojektowana przez architekta Giuseppe Mengoniego z Bolonii, wybranego spośród 176 kandydatów w konkursie z 1863 r. Kamień węgielny położył osobiście król Wiktor Emanuel II w 1865 r. Plan to krzyż grecki: dłuższe ramię 196 m, krótsze 105,5 m, kopuła szklana 47 m – jedno z pierwszych zastosowań żelaza i szkła na taką skalę! Galeria łączy dwa najważniejsze place Mediolanu: Piazza del Duomo i Piazza della Scala (opera!).\n\nTRAGEDIA MENGONIEGO: 30 grudnia 1877 r., na kilka godzin przed wielką inauguracją, Mengoni spadł z wysokości kopuły i zginął na miejscu. Okoliczności tajemnicze – niektórzy podejrzewali samobójstwo. Nie doczekał otwarcia własnego arcydzieła.\n\nTRADYCJA Z BYKIEM: na skrzyżowaniu naw mozaika z herbami 4 miast Królestwa Włoch (Turyn, Florencja, Rzym, Mediolan). Na byku turyńskim: piętą na „klejnotach" + 3 obroty = szczęście! Początkowo kpina mediańczyków z rywala – Turynu. Dziś byk wydrążony od milionów turystów!\n\nCiekawostka: wszystkie szyldy w Gallerii muszą być złote na czarnym tle – regulacja miejska. Historyczne lokale: Biffi Caffè, Camparino (bar założony przez Campari!), kawiarnia Savini.\n\nDla Emilki: byk na podłodze – szukaj go! Trzeba stać piętą na brzuszku byka i kręcić się 3 razy! 🐂'},
{time:'17:25',cat:'transport',title:'Metro → Navigli',desc:'Metro Duomo → M1/M2 → Porta Genova (~15 min) + pieszo 10 min.'},

function catLabel(c){return{landmark:'Atrakcja',food:'Jedzenie',transport:'Transport',event:'Wydarzenie'}[c]||c}

// ========== MAPS ==========
const _maps={};
function makeIcon(emoji){
return L.divIcon({
className:'map-marker-icon',
html:'<div style="background:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:2px solid #2b6cb0;box-shadow:0 2px 4px rgba(0,0,0,.2);font-size:15px">'+emoji+'</div>',
iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-15]
});
}
function initMap(idx){
if(_maps[idx])return;
var el=document.getElementById('map-day-'+idx);
if(!el||!DAY_MAPS[idx])return;
var data=DAY_MAPS[idx];
var map=L.map(el,{scrollWheelZoom:false,dragging:true,touchZoom:true,tap:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>'
}).addTo(map);
var bounds=[];
data.markers.forEach(function(m){
var emoji=m.label.match(/^\S+/);
emoji=emoji?emoji[0]:'📍';
var icon=makeIcon(emoji);
var popupHtml='<b>'+m.label+'</b><br><a href="https://www.google.com/maps/dir/?api=1&destination='+m.lat+','+m.lng+'&travelmode=walking" target="_blank" rel="noopener" style="font-size:12px">🧭 Nawiguj tu</a>';
L.marker([m.lat,m.lng],{icon:icon}).addTo(map).bindPopup(popupHtml);
bounds.push([m.lat,m.lng]);
});
if(bounds.length>1){
L.polyline(bounds,{color:'#2b6cb0',weight:2,dashArray:'6,8',opacity:.6}).addTo(map);
map.fitBounds(bounds,{padding:[30,30]});
}else if(bounds.length===1){
map.setView(bounds[0],14);
}
_maps[idx]=map;
}

function switchDay(i){
document.querySelectorAll('.day-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
document.querySelectorAll('.day-section').forEach((s,j)=>s.classList.toggle('active',j===i));
document.querySelectorAll('.day-tab')[i].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
setTimeout(function(){initMap(i)},150);
}

// Bottom nav
document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(btn.dataset.tab).classList.add('active');
window.scrollTo({top:0,behavior:'smooth'});
});
});

function getTodayDay(){
var tripStart=new Date(2026,3,30); // April 30
var now=new Date();
var diff=Math.floor((now-tripStart)/(1000*60*60*24));
if(diff>=0&&diff<7)return diff+1;
return -1;
}

function openFullscreen(src){
document.getElementById('fsImg').src=src;
document.getElementById('fsOverlay').classList.add('open');
document.body.style.overflow='hidden';
}
function closeFullscreen(){
document.getElementById('fsOverlay').classList.remove('open');
document.body.style.overflow='';
}

function renderTickets(){
var c=document.getElementById('ticketsContainer');
var h='';
var todayDay=getTodayDay();
var grouped={};
TICKET_EVENTS.forEach(function(ev,ei){
if(!grouped[ev.day])grouped[ev.day]={date:ev.date,events:[]};
grouped[ev.day].events.push({ev:ev,idx:ei});
});
var dayNames={3:'Dzień 3 — Sobota, 2 maja',4:'Dzień 4 — Niedziela, 3 maja',5:'Dzień 5 — Poniedziałek, 4 maja'};
for(var day in grouped){
var isToday=parseInt(day)===todayDay;
h+='<div class="ticket-day-group"><div class="ticket-day-title">'+dayNames[day];
if(isToday)h+='<span class="today-badge">DZIŚ</span>';
h+='</div>';
grouped[day].events.forEach(function(item){
var ev=item.ev;var ei=item.idx;
var todayCls=isToday?' today':'';
h+='<div class="ticket-card'+todayCls+'" onclick="toggleTicketBody(\'tb-'+ei+'\')">';
h+='<div class="ticket-header"><span class="ticket-icon">'+ev.icon+'</span>';
h+='<span class="ticket-title">'+ev.title+'</span>';
h+='<span class="ticket-time">'+ev.time+'</span></div>';
h+='<div class="ticket-sub">'+ev.venue+(ev.gate?' · '+ev.gate:'')+'</div>';
if(ev.seats)h+='<div class="ticket-sub">Miejsca: '+ev.seats+'</div>';
h+='<div class="ticket-seats">';
ev.tickets.forEach(function(t){
var label=t.seat||t.name||t.code||'';
h+='<span class="seat-badge">'+label+(t.note?' ('+t.note+')':'')+'</span>';
});
h+='</div>';
if(ev.warn)h+='<div class="ticket-warning">⚠️ '+ev.warn+'</div>';
// Expandable body with images
h+='<div class="ticket-body" id="tb-'+ei+'">';
h+='<div class="ticket-details"><strong>Łącznie:</strong> '+ev.total+'</div>';
// Reservation images if any
if(ev.resImgKeys){
h+='<div style="margin:8px 0"><strong style="font-size:12px">Rezerwacja ('+ev.res+'):</strong></div>';
ev.resImgKeys.forEach(function(rk){
if(typeof TICKET_IMAGES!=='undefined'&&TICKET_IMAGES[rk]){
h+='<div class="ticket-img-wrap"><img src="'+TICKET_IMAGES[rk]+'" loading="lazy" onclick="event.stopPropagation();openFullscreen(this.src)">';
h+='<button class="ticket-zoom-btn" onclick="event.stopPropagation();openFullscreen(TICKET_IMAGES[\''+rk+'\'])">🔍 Powiększ</button></div>';
}});
}
// Person selector for named tickets (Bernina)
if(ev.tickets[0].name){
h+='<div style="margin-top:8px"><select class="ticket-person-select" onchange="event.stopPropagation();showPersonTicket('+ei+',this.value)" onclick="event.stopPropagation()">';
h+='<option value="">— Wybierz uczestniczkę —</option>';
ev.tickets.forEach(function(t,ti){
h+='<option value="'+ti+'">'+t.name+(t.note?' ('+t.note+')':'')+' — '+t.price+'</option>';
});
h+='</select></div>';
h+='<div id="person-ticket-'+ei+'"></div>';
}else{
// Show all ticket images
ev.tickets.forEach(function(t,ti){
var label=t.seat||t.code||'Bilet '+(ti+1);
if(typeof TICKET_IMAGES!=='undefined'&&TICKET_IMAGES[t.imgKey]){
h+='<div style="margin-top:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+label+' · '+t.type+' · '+t.price+'</div>';
h+='<div class="ticket-img-wrap"><img src="'+TICKET_IMAGES[t.imgKey]+'" loading="lazy" onclick="event.stopPropagation();openFullscreen(this.src)">';
h+='<button class="ticket-zoom-btn" onclick="event.stopPropagation();openFullscreen(TICKET_IMAGES[\''+t.imgKey+'\'])">🔍 Powiększ</button></div></div>';
}});
}
h+='</div>'; // end ticket-body
h+='</div>'; // end ticket-card
});
h+='</div>';
}
// Summary
h+='<div class="ticket-summary"><div class="ticket-summary-card"><h3>💰 Podsumowanie kosztów biletów</h3>';
TICKET_SUMMARY.forEach(function(s){
h+='<div class="info-row'+(s.hl?' style="font-weight:700;font-size:15px;border-top:2px solid var(--blue)"':'')+'"><span>'+s.item+'</span><strong>'+s.cost+'</strong></div>';
});
h+='</div></div>';
c.innerHTML=h;
}

function toggleTicketBody(id){
document.getElementById(id).classList.toggle('open');
}

function showPersonTicket(evIdx,ticketIdx){
var container=document.getElementById('person-ticket-'+evIdx);
if(ticketIdx===''){container.innerHTML='';return;}
var t=TICKET_EVENTS[evIdx].tickets[parseInt(ticketIdx)];
if(typeof TICKET_IMAGES!=='undefined'&&TICKET_IMAGES[t.imgKey]){
container.innerHTML='<div class="ticket-img-wrap"><img src="'+TICKET_IMAGES[t.imgKey]+'" loading="lazy" onclick="event.stopPropagation();openFullscreen(this.src)"><button class="ticket-zoom-btn" onclick="event.stopPropagation();openFullscreen(TICKET_IMAGES[\''+t.imgKey+'\'])">🔍 Powiększ bilet</button></div>';
}else{
container.innerHTML='<div style="font-size:12px;color:#888;padding:8px">Obraz biletu niedostępny</div>';
}
}

function showPlanTickets(key){
var data=PLAN_TICKETS[key];
if(!data)return;
document.getElementById('tsTitle').textContent=data.title;
var h='';
data.items.forEach(function(it){
if(typeof TICKET_IMAGES!=='undefined'&&TICKET_IMAGES[it.imgKey]){
h+='<div class="ts-item" onclick="closeTsOverlay();openFullscreen(TICKET_IMAGES[\''+it.imgKey+'\'])">';
h+='<span class="ts-item-icon">🎫</span><div class="ts-item-info">';
h+='<div class="ts-item-label">'+it.label+'</div>';
h+='<div class="ts-item-sub">'+it.sub+'</div>';
h+='</div></div>';
}});
document.getElementById('tsItems').innerHTML=h;
document.getElementById('tsOverlay').classList.add('open');
document.body.style.overflow='hidden';
}
function closeTsOverlay(){
document.getElementById('tsOverlay').classList.remove('open');
document.body.style.overflow='';
}

</script>
